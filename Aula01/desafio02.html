<body>
    <h1>Integrando os recursos de interatividade do JS <mark>COMIFRM</mark></h1>
    <p id="resultado-tela" style="font-size: 20px; font-weight: bold;"></p>
<script>
let numero = 10;
let numero2 = 5;
let resultado;

let querSomar = confirm("Deseja somar?");
let querSubtrair = confirm("Deseja subtrair?");
let querMultiplicar = confirm("Deseja multiplicar?");

if (querSomar == true) {
    resultado = (numero + numero2);
    console.log("o resultado da sua soma é : " + resultado);
} 
else if (querSubtrair == true) {
    alert("Então vamos subtrair");
    resultado = (numero - numero2);
    console.log("O resultado da sua subtração é: " + resultado);
} 
else if (querMultiplicar == true) {
    alert("Então vamos multiplicar");
    resultado = (numero * numero2);
    console.log("O resultado da sua multiplicação é: " + resultado);
} 
else {
    alert("Então vamos dividir");
    resultado = (numero / numero2);
  console.log("O resultado da sua divisão é: "+resultado)
}
 </script>
