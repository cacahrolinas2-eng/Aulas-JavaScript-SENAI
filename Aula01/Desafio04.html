<body>
    <h1>Integrando os recursos de interatividade do JS <mark>COMIFRM</mark></h1>
<script>


let peso = parseFloat(prompt("Digite o seu peso (em kg):"));
let altura = parseFloat(prompt("Digite a sua altura (em metros, ex: 1.75):"));
let imc = peso / (altura * altura);

if (imc < 18.5) {
    alert("Seu IMC é " + imc + ". Classificação: Abaixo do peso");
    console.log("Abaixo do peso");
} 
else if (imc >= 18.5 && imc < 25) {
    alert("Seu IMC é " + imc + ". Classificação: Peso normal");
    console.log("Peso normal");
} 
else if (imc >= 25 && imc < 30) {
    alert("Seu IMC é " + imc + ". Classificação: Sobrepeso");
    console.log("Sobrepeso");
} 
else {
    alert("Seu IMC é " + imc + ". Classificação: Obesidade");
    console.log("Obesidade");
}

document.getElementById("resultado-tela").innerText = "Seu IMC é " + imc;
</script>

</body>
</html>
